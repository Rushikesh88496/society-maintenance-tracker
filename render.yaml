services:
  - type: web
    name: society-maintenance-api
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: PORT
        value: "5000"
      - key: CORS_ORIGIN
        value: ""
